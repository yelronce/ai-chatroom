<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群聊聊天室 - 登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>群聊聊天室</h1>
    <p class="subtitle">注册或登录后进入聊天室</p>
    <div class="tabs">
      <button class="tab active" data-tab="login">登录</button>
      <button class="tab" data-tab="register">注册</button>
    </div>
    <form id="loginForm" class="form active">
      <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
      <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
      <button type="submit">登录</button>
    </form>
    <form id="registerForm" class="form">
      <input type="text" id="regUsername" placeholder="用户名（2-20 字符）" autocomplete="username">
      <input type="password" id="regPassword" placeholder="密码（至少 6 位）" autocomplete="new-password">
      <button type="submit">注册</button>
    </form>
    <p id="error" class="error"></p>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
