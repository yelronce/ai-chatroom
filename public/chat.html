<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群聊聊天室</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="chat-page">
  <header class="chat-header">
    <h1>群聊聊天室</h1>
    <div class="header-right">
      <span id="connectionStatus" class="connection-status"></span>
      <button id="retryBtn" class="btn-retry" style="display:none">重试连接</button>
      <span id="username" class="username"></span>
      <button id="logoutBtn" class="btn-logout">退出</button>
    </div>
  </header>
  <main class="chat-main">
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="输入消息，@AI 或 @主持人 可召唤 AI 回复，按 Enter 发送..." rows="2"></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
